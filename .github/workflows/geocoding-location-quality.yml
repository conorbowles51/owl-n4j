name: Geocoding Location Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-geocoding:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt pytest

      - name: Run backend geocoding tests
        env:
          PYTHONPATH: backend
        run: |
          python -m pytest -q \
            backend/tests/test_location_validation.py \
            backend/tests/test_graph_edit_service.py

  evidence-engine-geocoding:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install evidence-engine dependencies
        working-directory: evidence-engine
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run evidence-engine geocoding tests
        env:
          PYTHONPATH: evidence-engine
        run: |
          python -m pytest -q \
            evidence-engine/tests/test_location_validation.py \
            evidence-engine/tests/test_geocoding.py \
            evidence-engine/tests/test_manual_graph_edits.py \
            evidence-engine/tests/test_cellebrite_location_validation.py
