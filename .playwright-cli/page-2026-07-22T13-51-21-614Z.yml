                                          - generic:
                                            - heading [level=2]: Overview
                                            - paragraph:
                                              - text: "Whistleblower Complaint #WB-2024-0042 was filed on January 15, 2024, by an anonymous filer identified as being in Finance–Accounts Payable, with the employee ID redacted. The complainant states a belief that a systematic fraud scheme was operating within the procurement division and reports observing irregularities over the preceding 18 months. The complaint identifies Marcus Chen, Victoria Blackwood, and David Okonkwo under “Key Individuals Involved.” It states that Chen was Senior Procurement Manager who oversaw vendor relationships and contract approvals; that Blackwood was CEO of Nexus Trading Ltd; and that Okonkwo was Accounts Payable Supervisor. The complainant further states that Okonkwo approved payments without proper documentation, frequently processed urgent payments outside normal procedures, and had a close personal relationship with Chen."
                                              - button: 01_whistleblower_report.pdf, p.1
                                            - paragraph:
                                              - text: The complaint reports six payments to Nexus Trading Ltd dated from March 15 through December 20, 2023, with a listed total of €1,035,000. The listed descriptions are Strategic Consulting Phase 1, Market Research Services, Operational Advisory, Integration Support, Strategic Consulting Phase 2, and Year-End Advisory Services. The complainant states that Nexus was added as a vendor by Chen without standard onboarding; that its invoices lacked specific deliverables; that it had no website, LinkedIn presence, or verifiable business history; and that Blackwood’s signature appeared to match Chen’s handwriting. The complaint describes Nexus as an external vendor supplying “consulting services,” states that it was registered in the British Virgin Islands, and identifies its bank account as being at First Caribbean International Bank in Tortola.
                                              - button: 01_whistleblower_report.pdf, p.2
                                            - heading [level=2]: Key Entities
                                            - list:
                                              - listitem:
                                                - strong: Anonymous complainant
                                                - text: — The complaint identifies the filer as anonymous, with an employee ID redacted, and lists the department as Finance – Accounts Payable.
                                                - button: 01_whistleblower_report.pdf, p.1
                                              - listitem:
                                                - strong: Marcus Chen
                                                - text: — Identified in the complaint as Senior Procurement Manager who had been with the company for seven years and oversaw vendor relationships and contract approvals. The complainant states that Chen recently purchased a luxury property in Monaco despite a “modest salary.”
                                                - button: 01_whistleblower_report.pdf, p.1
                                              - listitem:
                                                - strong: Victoria Blackwood
                                                - text: — Identified in the complaint as CEO of Nexus Trading Ltd. The complainant states that her signature appeared to match Chen’s handwriting.
                                                - button: 01_whistleblower_report.pdf, p.2
                                              - listitem:
                                                - strong: David Okonkwo
                                                - text: — Identified in the complaint as Accounts Payable Supervisor. The complainant states that Okonkwo approved payments without proper documentation, frequently processed urgent payments outside normal procedures, and had a close personal relationship with Chen.
                                                - button: 01_whistleblower_report.pdf, p.1
                                              - listitem:
                                                - strong: Nexus Trading Ltd
                                                - text: — Described in the complaint as an external vendor supplying “consulting services” and as registered in the British Virgin Islands. The complainant states that its invoices lacked specific deliverables and that it had no website, LinkedIn presence, or verifiable business history.
                                                - button: 01_whistleblower_report.pdf, p.2
                                              - listitem:
                                                - strong: First Caribbean International Bank, Tortola
                                                - text: — Identified in the complaint as the location of Nexus Trading Ltd’s bank account.
                                                - button: 01_whistleblower_report.pdf, p.2
                                              - listitem:
                                                - strong: Luxury property in Monaco
                                                - text: — The complainant states that Chen recently purchased a luxury property in Monaco despite a “modest salary.”
                                                - button: 01_whistleblower_report.pdf, p.1
                                            - heading [level=2]: Key Facts & Dates
                                            - list:
                                              - listitem:
                                                - strong: January 15, 2024
                                                - text: — The complaint lists this as its filing date.
                                                - button: 01_whistleblower_report.pdf, p.1
                                              - listitem:
                                                - strong: Over the preceding 18 months
                                                - text: — The complainant states that irregularities were observed over this period.
                                                - button: 01_whistleblower_report.pdf, p.1
                                              - listitem:
