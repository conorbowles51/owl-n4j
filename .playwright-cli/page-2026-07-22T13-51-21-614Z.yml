                                                - text: — The complaint lists a €125,000 payment to Nexus Trading Ltd for “Strategic Consulting Phase 1.”
                                                - button: 01_whistleblower_report.pdf, p.1
                                              - listitem:
                                                - strong: May 22, 2023
