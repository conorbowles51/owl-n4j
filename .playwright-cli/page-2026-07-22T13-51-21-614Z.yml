                                                - button: 01_whistleblower_report.pdf, p.2
                                              - listitem:
                                                - strong: July 8, 2023
                                                - text: — The complaint lists a €95,000 payment to Nexus Trading Ltd for “Operational Advisory.”
                                                - button: 01_whistleblower_report.pdf, p.2
                                              - listitem:
                                                - strong: September 30, 2023
                                                - text: — The complaint lists a €210,000 payment to Nexus Trading Ltd for “Integration Support.”
                                                - button: 01_whistleblower_report.pdf, p.2
