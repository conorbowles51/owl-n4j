                - heading "Overview" [level=2] [ref=f1e475]
                - paragraph [ref=f1e476]:
                  - text: "Whistleblower Complaint #WB-2024-0042 is a confidential internal complaint filed anonymously on January 15, 2024, by an employee in Finance–Accounts Payable. The complainant reports believing that a systematic fraud scheme operated within the procurement division, based on irregularities observed over the preceding 18 months, and states that the matter warrants immediate investigation. The complaint identifies Senior Procurement Manager Marcus Chen, Nexus Trading Ltd CEO Victoria Blackwood, and Accounts Payable Supervisor David Okonkwo as key individuals. It states that Chen oversees vendor relationships and contract approvals, recently purchased a luxury property in Monaco despite a described modest salary, that Blackwood’s company supplies “consulting services,” and that Okonkwo approves payments without proper documentation and frequently processes urgent payments outside normal procedures."
                  - button "01_whistleblower_report.pdf, p.1" [ref=f1e477] [cursor=pointer]
                - paragraph [ref=f1e478]:
                  - text: The complaint lists six payments to Nexus Trading Ltd between March 15 and December 20, 2023, totaling €1,035,000. The listed payment descriptions include strategic consulting, market research, operational advisory, integration support, and year-end advisory services. The complainant states that Nexus was added as a vendor by Chen without standard onboarding; that Nexus is registered in the British Virgin Islands, has no website, LinkedIn presence, or verifiable business history, and submitted invoices lacking specific deliverables; and that its bank account is at First Caribbean International Bank in Tortola. The complainant also states that Blackwood’s signature appears to match Chen’s handwriting and describes Chen and Okonkwo as having a close personal relationship.
                  - button "01_whistleblower_report.pdf, p.2" [ref=f1e479] [cursor=pointer]
