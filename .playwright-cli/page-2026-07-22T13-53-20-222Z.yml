                - generic [ref=f7e1692]:
                  - heading "Background" [level=2] [ref=f7e1693]
                  - paragraph [ref=f7e1694]:
                    - strong [ref=f7e1695]: Marcus Wei Chen
                    - text: is identified in an arrest warrant as British, born
                    - strong [ref=f7e1696]: 3 September 1982
                    - text: ", with last known address"
                    - strong [ref=f7e1697]: 45 Riverside Walk, London, SW11 3XX
                    - text: . The warrant identifies him as a defendant; he is also listed as a defendant in a worldwide freezing order.
                    - button "11_arrest_warrant_chen.pdf, p.1" [ref=f7e1698] [cursor=pointer]
                    - button "12_asset_freezing_order.pdf, p.1" [ref=f7e1699] [cursor=pointer]
                  - paragraph [ref=f7e1700]:
                    - text: Internal-investigation material identifies
                    - strong [ref=f7e1701]: Marcus Chen
                    - text: as Senior Procurement Manager. A whistleblower complaint identifies Marcus Chen as Senior Procurement Manager and states that he oversees vendor relationships and contract approvals. David Okonkwo described Marcus Chen as a senior manager.
                    - button "06_interview_marcus_chen.pdf, p.1" [ref=f7e1702] [cursor=pointer]
                    - button "01_whistleblower_report.pdf, p.1" [ref=f7e1703] [cursor=pointer]
                    - button "07_interview_david_okonkwo.pdf, p.1" [ref=f7e1704] [cursor=pointer]
                  - heading "Nexus Trading Ltd" [level=2] [ref=f7e1705]
                  - paragraph [ref=f7e1706]:
                    - text: Marcus Chen stated in an email that he had created the vendor profile for Nexus Trading. During an interview, he confirmed that he onboarded Nexus Trading Ltd and stated that he managed its vendor relationship. The whistleblower complaint alleges that Marcus Chen added Nexus Trading Ltd without standard onboarding.
                    - button "04_email_evidence.pdf, p.1" [ref=f7e1707] [cursor=pointer]
                    - button "06_interview_marcus_chen.pdf, p.1" [ref=f7e1708] [cursor=pointer]
                    - button "01_whistleblower_report.pdf, p.1" [ref=f7e1709] [cursor=pointer]
                  - paragraph [ref=f7e1710]:
                    - text: A forensic accounting report identifies Marcus Chen in procurement as the approver of invoices that the report describes as fraudulent and as created by Nexus Trading Ltd.
                    - button "08_forensic_accounting_report.pdf, p.1" [ref=f7e1711] [cursor=pointer]
                  - paragraph [ref=f7e1712]:
                    - text: "An email attributed to Marcus Chen instructed use of a BVI account and stated: “Wait 3 days after receiving funds before moving to Cayman.” The same email directed David Okonkwo to use Signal rather than company email for sensitive communications."
                    - button "04_email_evidence.pdf, p.1" [ref=f7e1713] [cursor=pointer]
                    - button "04_email_evidence.pdf, p.2" [ref=f7e1714] [cursor=pointer]
                  - heading "David Okonkwo" [level=2] [ref=f7e1715]
                  - paragraph [ref=f7e1716]:
                    - text: David Okonkwo stated that Marcus Chen said normal procedures did not apply to a Nexus Trading-related special project because it was confidential executive work. Okonkwo also stated that Chen said there would be something in it for him if he helped, mentioning a promotion and bonus.
                    - button "07_interview_david_okonkwo.pdf, p.1" [ref=f7e1717] [cursor=pointer]
                  - paragraph [ref=f7e1718]:
                    - text: The phone-records analysis lists 156 calls and 89 SMS messages between the subject number identified as Marcus Chen’s and a personal mobile identified as David Okonkwo’s. The analysis describes the call pattern as business hours, with peaks around invoice dates. It lists a 12-minute call with D. Okonkwo on
                    - strong [ref=f7e1719]: 17 March 2023
                    - text: ", described as occurring on the day a payment was processed."
                    - button "09_phone_records_analysis.pdf, p.1" [ref=f7e1720] [cursor=pointer]
                  - paragraph [ref=f7e1721]:
                    - text: The whistleblower complaint alleges that Okonkwo had a close personal relationship with Marcus Chen. Arrest-warrant material alleges a conspiracy involving Chen and David Okonkwo.
                    - button "01_whistleblower_report.pdf, p.1" [ref=f7e1722] [cursor=pointer]
                    - button "11_arrest_warrant_chen.pdf, p.1" [ref=f7e1723] [cursor=pointer]
                  - heading "Victoria Blackwood / “V. Blackwood”" [level=2] [ref=f7e1724]
                  - paragraph [ref=f7e1725]:
                    - text: Okonkwo stated that Marcus Chen introduced him to Victoria Blackwood once.
                    - button "07_interview_david_okonkwo.pdf, p.2" [ref=f7e1726] [cursor=pointer]
                  - paragraph [ref=f7e1727]:
                    - text: A forensic accounting report states that there were 847 calls between Marcus Chen and a UK mobile number registered to “V. Blackwood” from January 2023 through February 2024. The phone-records analysis lists 234 SMS messages, states that calls were primarily in evenings and weekends, and identifies the longest call as 2 hours 14 minutes on
                    - strong [ref=f7e1728]: 15 December 2023
                    - text: .
                    - button "08_forensic_accounting_report.pdf, p.2" [ref=f7e1729] [cursor=pointer]
                    - button "09_phone_records_analysis.pdf, p.1" [ref=f7e1730] [cursor=pointer]
                  - paragraph [ref=f7e1731]:
                    - text: The analysis lists calls with V. Blackwood on
                    - strong [ref=f7e1732]: 14 March 2023
                    - text: (45 minutes; described as the day before the first payment);
                    - strong [ref=f7e1733]: 21 May 2023
                    - text: (38 minutes; day before the second payment);
                    - strong [ref=f7e1734]: 7 July 2023
                    - text: (52 minutes; day before the third payment);
                    - strong [ref=f7e1735]: 25 August 2023
                    - text: (1 hour 20 minutes; three days before the Monaco purchase);
                    - strong [ref=f7e1736]: 29 September 2023
                    - text: (41 minutes; day before the fourth payment);
                    - strong [ref=f7e1737]: 11 November 2023
                    - text: (35 minutes; day before the fifth payment); and
                    - strong [ref=f7e1738]: 19 December 2023
                    - text: (55 minutes; day before the final payment).
                    - button "09_phone_records_analysis.pdf, p.1" [ref=f7e1739] [cursor=pointer]
                  - paragraph [ref=f7e1740]:
                    - text: Arrest-warrant material alleges a conspiracy involving Chen and Victoria Blackwood, whose identity is described in that material as unknown. The whistleblower complaint alleges that Victoria Blackwood’s signature appears to match Marcus Chen’s handwriting.
                    - button "11_arrest_warrant_chen.pdf, p.1" [ref=f7e1741] [cursor=pointer]
                    - button "01_whistleblower_report.pdf, p.1" [ref=f7e1742] [cursor=pointer]
                  - heading "Financial and property information" [level=2] [ref=f7e1743]
                  - paragraph [ref=f7e1744]:
                    - text: The forensic accounting report states that Marcus Chen’s personal HSBC UK account received deposits totaling
                    - strong [ref=f7e1745]: £45,000
                    - text: from unknown sources in
                    - strong [ref=f7e1746]: "2023"
                    - text: ", which the report characterizes as inconsistent with his salary. A worldwide freezing order identifies an HSBC UK account in the name of Marcus Chen."
                    - button "08_forensic_accounting_report.pdf, p.2" [ref=f7e1747] [cursor=pointer]
                    - button "12_asset_freezing_order.pdf, p.1" [ref=f7e1748] [cursor=pointer]
                  - paragraph [ref=f7e1749]:
                    - text: The whistleblower complaint states that Marcus Chen recently purchased a luxury property in Monaco despite a modest salary.
                    - button "01_whistleblower_report.pdf, p.1" [ref=f7e1750] [cursor=pointer]
                  - heading "Interview, travel, and court-related material" [level=2] [ref=f7e1751]
                  - paragraph [ref=f7e1752]:
                    - text: "On"
                    - strong [ref=f7e1753]: 5 March 2024
                    - text: ", Marcus Chen was interviewed as Senior Procurement Manager. The interview was suspended at"
                    - strong [ref=f7e1754]: 10:32 AM
                    - text: ", and he was suspended with pay pending further investigation."
                    - button "06_interview_marcus_chen.pdf, p.1" [ref=f7e1755] [cursor=pointer]
                    - button "06_interview_marcus_chen.pdf, p.2" [ref=f7e1756] [cursor=pointer]
                  - paragraph [ref=f7e1757]:
                    - text: The phone-records analysis identifies its subject as Marcus Chen and lists his mobile number as
                    - strong [ref=f7e1758]: +44 7700 900XXX
                    - text: .
                    - button "09_phone_records_analysis.pdf, p.1" [ref=f7e1759] [cursor=pointer]
                  - paragraph [ref=f7e1760]:
                    - text: The arrest warrant states that passport records show Marcus Wei Chen departed to Dubai on
                    - strong [ref=f7e1761]: 8 April 2024
                    - text: . It also states that his mobile phone was last active at Heathrow Terminal 5 that date. The warrant states that the defendant failed to appear for a scheduled interview on
                    - strong [ref=f7e1762]: 10 April 2024
                    - text: .
                    - button "11_arrest_warrant_chen.pdf, p.1" [ref=f7e1763] [cursor=pointer]
                  - paragraph [ref=f7e1764]:
                    - text: Marcus Wei Chen is named as a defendant in
                    - strong [ref=f7e1765]: Worldwide Freezing Order, Case No. CL-2024-000892
                    - text: . The order requires Marcus Chen to deliver up his passport within 24 hours.
                    - button "12_asset_freezing_order.pdf, p.1" [ref=f7e1766] [cursor=pointer]
