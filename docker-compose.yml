name: owl-v2

services:
  neo4j:
    image: neo4j:5
    container_name: owl-v2-n4j
    restart: unless-stopped
    ports:
      - "7475:7474"
      - "7688:7687"
    environment:
      - NEO4J_AUTH=neo4j/testpassword
      - NEO4J_server_memory_pagecache_size=2G
      - NEO4J_server_memory_heap_initial__size=4G
      - NEO4J_server_memory_heap_max__size=4G
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*
      - NEO4J_db_transaction_timeout=25s
    volumes:
      - ./neo4j/data:/data
      - ./neo4j/logs:/logs
      - ./neo4j/plugins:/plugins
      - ./neo4j/import:/import

  postgres:
    image: postgres:16
    container_name: owl-v2-pg
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: owl_db
      POSTGRES_USER: owl_us
      POSTGRES_PASSWORD: owl_pw
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U owl_us -d owl_db"]
      interval: 5s
      timeout: 5s
      retries: 20

  chromadb:
    image: chromadb/chroma:latest
    container_name: owl-v2-chromadb
    restart: unless-stopped
    ports:
      - "8101:8000"
    volumes:
      - chromadb-data:/data

  redis:
    image: redis:7-alpine
    container_name: owl-v2-redis
    restart: unless-stopped
    ports:
      - "6380:6379"

  evidence-db-migrate:
    build:
      context: .
      dockerfile: evidence-engine/Dockerfile
    command: python -m alembic -c /backend/alembic.ini upgrade head
    environment:
      DATABASE_URL: postgresql+psycopg://owl_us:owl_pw@postgres:5432/owl_db
    depends_on:
      postgres:
        condition: service_healthy

  evidence-engine-api:
    build:
      context: .
      dockerfile: evidence-engine/Dockerfile
    container_name: owl-v2-evidence-api
    restart: unless-stopped
    ports:
      - "8003:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://owl_us:owl_pw@postgres:5432/owl_db
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: testpassword
      CHROMA_HOST: chromadb
      CHROMA_PORT: "8000"
      REDIS_URL: redis://redis:6379
      SERVICE_API_KEY: ${EVIDENCE_ENGINE_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      AI_CREDENTIAL_ENCRYPTION_KEY: ${AI_CREDENTIAL_ENCRYPTION_KEY:-loupe-development-ai-credentials-change-me}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.6-terra}
      OPENAI_EXTRACTION_MODEL: ${OPENAI_EXTRACTION_MODEL:-gpt-5.6-terra}
      OPENAI_RESOLUTION_MODEL: ${OPENAI_RESOLUTION_MODEL:-gpt-5.6-terra}
      OPENAI_SUMMARY_MODEL: ${OPENAI_SUMMARY_MODEL:-gpt-5.6-terra}
      OPENAI_DOCUMENT_SUMMARY_MODEL: ${OPENAI_DOCUMENT_SUMMARY_MODEL:-gpt-5.6-sol}
      OPENAI_QUALITY_MODEL: ${OPENAI_QUALITY_MODEL:-gpt-5.6-terra}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      OPENAI_EMBEDDING_BATCH_SIZE: ${OPENAI_EMBEDDING_BATCH_SIZE:-16}
      OPENAI_EMBEDDING_MAX_BATCH_CHARS: ${OPENAI_EMBEDDING_MAX_BATCH_CHARS:-80000}
      EXTRACTION_MAX_CONCURRENCY: ${EXTRACTION_MAX_CONCURRENCY:-6}
      DOCUMENT_SUMMARY_MAX_CONCURRENCY: ${DOCUMENT_SUMMARY_MAX_CONCURRENCY:-3}
      CLAIM_VERIFICATION_ENABLED: ${CLAIM_VERIFICATION_ENABLED:-true}
      CLAIM_VERIFICATION_MAX_CLAIMS: ${CLAIM_VERIFICATION_MAX_CLAIMS:-250}
      CLAIM_VERIFICATION_BATCH_SIZE: ${CLAIM_VERIFICATION_BATCH_SIZE:-20}
      CLAIM_VERIFICATION_MAX_CONCURRENCY: ${CLAIM_VERIFICATION_MAX_CONCURRENCY:-2}
      OPENAI_VISION_MODEL: ${OPENAI_VISION_MODEL:-gpt-4o}
      OPENAI_TRANSCRIPTION_MODEL: ${OPENAI_TRANSCRIPTION_MODEL:-gpt-4o-mini-transcribe}
      AUDIO_TRANSCRIPTION_SEGMENT_SECONDS: ${AUDIO_TRANSCRIPTION_SEGMENT_SECONDS:-240}
      AUDIO_TRANSCRIPTION_MAX_SINGLE_SECONDS: ${AUDIO_TRANSCRIPTION_MAX_SINGLE_SECONDS:-240}
      IMAGE_PROVIDER: ${IMAGE_PROVIDER:-tesseract}
      TESSERACT_LANG: ${TESSERACT_LANG:-eng}
      PDF_OCR_DPI: ${PDF_OCR_DPI:-300}
      PDF_OCR_MAX_PIXELS: ${PDF_OCR_MAX_PIXELS:-25000000}
      PDF_OCR_PAGE_TIMEOUT_SECONDS: ${PDF_OCR_PAGE_TIMEOUT_SECONDS:-300}
      PDF_OCR_MAX_CONCURRENCY: ${PDF_OCR_MAX_CONCURRENCY:-2}
      MAX_UPLOAD_FILE_BYTES: ${MAX_UPLOAD_FILE_BYTES:-1073741824}
      MAX_UPLOAD_BATCH_FILES: ${MAX_UPLOAD_BATCH_FILES:-50}
      MAX_UPLOAD_BATCH_BYTES: ${MAX_UPLOAD_BATCH_BYTES:-5368709120}
      UPLOAD_READ_CHUNK_BYTES: ${UPLOAD_READ_CHUNK_BYTES:-1048576}
      BATCH_FILE_MAX_CONCURRENCY: ${BATCH_FILE_MAX_CONCURRENCY:-4}
      MAX_EXTRACTED_CHARACTERS: ${MAX_EXTRACTED_CHARACTERS:-50000000}
      MAX_PDF_PAGES: ${MAX_PDF_PAGES:-2000}
      MAX_IMAGE_PIXELS: ${MAX_IMAGE_PIXELS:-25000000}
      MAX_IMAGE_FILE_BYTES: ${MAX_IMAGE_FILE_BYTES:-50000000}
      MAX_TEXT_INPUT_BYTES: ${MAX_TEXT_INPUT_BYTES:-100000000}
      MAX_OFFICE_UNCOMPRESSED_BYTES: ${MAX_OFFICE_UNCOMPRESSED_BYTES:-500000000}
      MAX_OFFICE_ARCHIVE_ENTRIES: ${MAX_OFFICE_ARCHIVE_ENTRIES:-10000}
      VIDEO_FRAME_INTERVAL: ${VIDEO_FRAME_INTERVAL:-30}
      VIDEO_MAX_FRAMES: ${VIDEO_MAX_FRAMES:-50}
      STORAGE_PATH: ${STORAGE_PATH:-/data/files}
      CELLEBRITE_DATA_ROOT: /data/evidence
    volumes:
      - evidence-files:/data/files
      - ./evidence-data:/data/evidence
    depends_on:
      evidence-db-migrate:
        condition: service_completed_successfully
      neo4j:
        condition: service_started
      redis:
        condition: service_started
      chromadb:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ready', timeout=5)"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s

  evidence-engine-worker:
    build:
      context: .
      dockerfile: evidence-engine/Dockerfile
    container_name: owl-v2-evidence-worker
    restart: unless-stopped
    command: arq app.worker.WorkerSettings
    environment:
      DATABASE_URL: postgresql+asyncpg://owl_us:owl_pw@postgres:5432/owl_db
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: testpassword
      CHROMA_HOST: chromadb
      CHROMA_PORT: "8000"
      REDIS_URL: redis://redis:6379
      SERVICE_API_KEY: ${EVIDENCE_ENGINE_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      AI_CREDENTIAL_ENCRYPTION_KEY: ${AI_CREDENTIAL_ENCRYPTION_KEY:-loupe-development-ai-credentials-change-me}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.6-terra}
      OPENAI_EXTRACTION_MODEL: ${OPENAI_EXTRACTION_MODEL:-gpt-5.6-terra}
      OPENAI_RESOLUTION_MODEL: ${OPENAI_RESOLUTION_MODEL:-gpt-5.6-terra}
      OPENAI_SUMMARY_MODEL: ${OPENAI_SUMMARY_MODEL:-gpt-5.6-terra}
      OPENAI_DOCUMENT_SUMMARY_MODEL: ${OPENAI_DOCUMENT_SUMMARY_MODEL:-gpt-5.6-sol}
      OPENAI_QUALITY_MODEL: ${OPENAI_QUALITY_MODEL:-gpt-5.6-terra}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      OPENAI_EMBEDDING_BATCH_SIZE: ${OPENAI_EMBEDDING_BATCH_SIZE:-16}
      OPENAI_EMBEDDING_MAX_BATCH_CHARS: ${OPENAI_EMBEDDING_MAX_BATCH_CHARS:-80000}
      EXTRACTION_MAX_CONCURRENCY: ${EXTRACTION_MAX_CONCURRENCY:-6}
      DOCUMENT_SUMMARY_MAX_CONCURRENCY: ${DOCUMENT_SUMMARY_MAX_CONCURRENCY:-3}
      CLAIM_VERIFICATION_ENABLED: ${CLAIM_VERIFICATION_ENABLED:-true}
      CLAIM_VERIFICATION_MAX_CLAIMS: ${CLAIM_VERIFICATION_MAX_CLAIMS:-250}
      CLAIM_VERIFICATION_BATCH_SIZE: ${CLAIM_VERIFICATION_BATCH_SIZE:-20}
      CLAIM_VERIFICATION_MAX_CONCURRENCY: ${CLAIM_VERIFICATION_MAX_CONCURRENCY:-2}
      OPENAI_VISION_MODEL: ${OPENAI_VISION_MODEL:-gpt-4o}
      OPENAI_TRANSCRIPTION_MODEL: ${OPENAI_TRANSCRIPTION_MODEL:-gpt-4o-mini-transcribe}
      AUDIO_TRANSCRIPTION_SEGMENT_SECONDS: ${AUDIO_TRANSCRIPTION_SEGMENT_SECONDS:-240}
      AUDIO_TRANSCRIPTION_MAX_SINGLE_SECONDS: ${AUDIO_TRANSCRIPTION_MAX_SINGLE_SECONDS:-240}
      IMAGE_PROVIDER: ${IMAGE_PROVIDER:-tesseract}
      TESSERACT_LANG: ${TESSERACT_LANG:-eng}
      PDF_OCR_DPI: ${PDF_OCR_DPI:-300}
      PDF_OCR_MAX_PIXELS: ${PDF_OCR_MAX_PIXELS:-25000000}
      PDF_OCR_PAGE_TIMEOUT_SECONDS: ${PDF_OCR_PAGE_TIMEOUT_SECONDS:-300}
      PDF_OCR_MAX_CONCURRENCY: ${PDF_OCR_MAX_CONCURRENCY:-2}
      MAX_UPLOAD_FILE_BYTES: ${MAX_UPLOAD_FILE_BYTES:-1073741824}
      MAX_UPLOAD_BATCH_FILES: ${MAX_UPLOAD_BATCH_FILES:-50}
      MAX_UPLOAD_BATCH_BYTES: ${MAX_UPLOAD_BATCH_BYTES:-5368709120}
      UPLOAD_READ_CHUNK_BYTES: ${UPLOAD_READ_CHUNK_BYTES:-1048576}
      BATCH_FILE_MAX_CONCURRENCY: ${BATCH_FILE_MAX_CONCURRENCY:-4}
      MAX_EXTRACTED_CHARACTERS: ${MAX_EXTRACTED_CHARACTERS:-50000000}
      MAX_PDF_PAGES: ${MAX_PDF_PAGES:-2000}
      MAX_IMAGE_PIXELS: ${MAX_IMAGE_PIXELS:-25000000}
      MAX_IMAGE_FILE_BYTES: ${MAX_IMAGE_FILE_BYTES:-50000000}
      MAX_TEXT_INPUT_BYTES: ${MAX_TEXT_INPUT_BYTES:-100000000}
      MAX_OFFICE_UNCOMPRESSED_BYTES: ${MAX_OFFICE_UNCOMPRESSED_BYTES:-500000000}
      MAX_OFFICE_ARCHIVE_ENTRIES: ${MAX_OFFICE_ARCHIVE_ENTRIES:-10000}
      VIDEO_FRAME_INTERVAL: ${VIDEO_FRAME_INTERVAL:-30}
      VIDEO_MAX_FRAMES: ${VIDEO_MAX_FRAMES:-50}
      STORAGE_PATH: ${STORAGE_PATH:-/data/files}
      CELLEBRITE_DATA_ROOT: /data/evidence
    volumes:
      - evidence-files:/data/files
      - ./evidence-data:/data/evidence
    depends_on:
      evidence-db-migrate:
        condition: service_completed_successfully
      evidence-engine-api:
        condition: service_healthy

volumes:
  evidence-files:
  chromadb-data:
