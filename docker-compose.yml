name: owl-v2

services:
  neo4j:
    image: neo4j:5
    container_name: owl-v2-n4j
    restart: unless-stopped
    ports:
      - "7475:7474"
      - "7688:7687"
    environment:
      - NEO4J_AUTH=neo4j/testpassword
      - NEO4J_server_memory_pagecache_size=1G
      - NEO4J_server_memory_heap_initial__size=1G
      - NEO4J_server_memory_heap_max__size=1G
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*
    volumes:
      - ./neo4j/data:/data
      - ./neo4j/logs:/logs
      - ./neo4j/plugins:/plugins
      - ./neo4j/import:/import

  postgres:
    image: postgres:16
    container_name: owl-v2-pg
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: owl_db
      POSTGRES_USER: owl_us
      POSTGRES_PASSWORD: owl_pw
    volumes:
      - ./postgres/data:/var/lib/postgresql/data

  chromadb:
    image: chromadb/chroma:latest
    container_name: owl-v2-chromadb
    restart: unless-stopped
    ports:
      - "8101:8000"
    volumes:
      - chromadb-data:/chroma/chroma

  redis:
    image: redis:7-alpine
    container_name: owl-v2-redis
    restart: unless-stopped
    ports:
      - "6380:6379"

  evidence-engine-api:
    build: ./evidence-engine
    container_name: owl-v2-evidence-api
    restart: unless-stopped
    ports:
      - "8003:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://owl_us:owl_pw@postgres:5432/owl_db
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: testpassword
      CHROMA_HOST: chromadb
      CHROMA_PORT: "8000"
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5-mini}
      OPENAI_EXTRACTION_MODEL: ${OPENAI_EXTRACTION_MODEL:-gpt-5-mini}
      OPENAI_RESOLUTION_MODEL: ${OPENAI_RESOLUTION_MODEL:-gpt-5-mini}
      OPENAI_SUMMARY_MODEL: ${OPENAI_SUMMARY_MODEL:-gpt-5-mini}
      OPENAI_DOCUMENT_SUMMARY_MODEL: ${OPENAI_DOCUMENT_SUMMARY_MODEL:-gpt-5-mini}
      OPENAI_QUALITY_MODEL: ${OPENAI_QUALITY_MODEL:-gpt-5-mini}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      OPENAI_VISION_MODEL: ${OPENAI_VISION_MODEL:-gpt-4o}
      OPENAI_TRANSCRIPTION_MODEL: ${OPENAI_TRANSCRIPTION_MODEL:-gpt-4o-mini-transcribe}
      IMAGE_PROVIDER: ${IMAGE_PROVIDER:-tesseract}
      TESSERACT_LANG: ${TESSERACT_LANG:-eng}
      VIDEO_FRAME_INTERVAL: ${VIDEO_FRAME_INTERVAL:-30}
      VIDEO_MAX_FRAMES: ${VIDEO_MAX_FRAMES:-50}
      STORAGE_PATH: ${STORAGE_PATH:-/data/files}
    volumes:
      - evidence-files:/data/files
    depends_on:
      - neo4j
      - postgres
      - redis
      - chromadb

  evidence-engine-worker:
    build: ./evidence-engine
    container_name: owl-v2-evidence-worker
    restart: unless-stopped
    command: arq app.worker.WorkerSettings
    environment:
      DATABASE_URL: postgresql+asyncpg://owl_us:owl_pw@postgres:5432/owl_db
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: testpassword
      CHROMA_HOST: chromadb
      CHROMA_PORT: "8000"
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5-mini}
      OPENAI_EXTRACTION_MODEL: ${OPENAI_EXTRACTION_MODEL:-gpt-5-mini}
      OPENAI_RESOLUTION_MODEL: ${OPENAI_RESOLUTION_MODEL:-gpt-5-mini}
      OPENAI_SUMMARY_MODEL: ${OPENAI_SUMMARY_MODEL:-gpt-5-mini}
      OPENAI_DOCUMENT_SUMMARY_MODEL: ${OPENAI_DOCUMENT_SUMMARY_MODEL:-gpt-5-mini}
      OPENAI_QUALITY_MODEL: ${OPENAI_QUALITY_MODEL:-gpt-5-mini}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      OPENAI_VISION_MODEL: ${OPENAI_VISION_MODEL:-gpt-4o}
      OPENAI_TRANSCRIPTION_MODEL: ${OPENAI_TRANSCRIPTION_MODEL:-gpt-4o-mini-transcribe}
      IMAGE_PROVIDER: ${IMAGE_PROVIDER:-tesseract}
      TESSERACT_LANG: ${TESSERACT_LANG:-eng}
      VIDEO_FRAME_INTERVAL: ${VIDEO_FRAME_INTERVAL:-30}
      VIDEO_MAX_FRAMES: ${VIDEO_MAX_FRAMES:-50}
      STORAGE_PATH: ${STORAGE_PATH:-/data/files}
    volumes:
      - evidence-files:/data/files
    depends_on:
      - neo4j
      - postgres
      - redis
      - chromadb

volumes:
  evidence-files:
  chromadb-data:
