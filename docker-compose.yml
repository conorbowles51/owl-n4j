services:
  # NEO4J
  neo4j:
    image: neo4j:5
    container_name: owl-n4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # HTTP (browser)
      - "7687:7687"   # Bolt (drivers)
    environment:
      - NEO4J_AUTH=neo4j/testpassword
      - NEO4J_server_memory_pagecache_size=1G
      - NEO4J_server_memory_heap_initial__size=1G
      - NEO4J_server_memory_heap_max__size=1G

      # Enable APOC plugin (Neo4j official Docker way)
      - NEO4J_PLUGINS=["apoc"]

      # Allow APOC procedures (incl. refactor.mergeNodes)
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*

    volumes:
      - ./neo4j/data:/data
      - ./neo4j/logs:/logs
      - ./neo4j/plugins:/plugins
      - ./neo4j/import:/import

  # POSTGRES
  postgres:
    image: postgres:16
    container_name: owl-pg
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: owl_db
      POSTGRES_USER: owl_us
      POSTGRES_PASSWORD: owl_pw
    volumes:
      - ./postgres/data:/var/lib/postgresql/data

  # REDIS (shared: evidence-engine job queue + progress pub/sub)
  redis:
    image: redis:7-alpine
    container_name: owl-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  # EVIDENCE ENGINE — ingestion microservice
  # Postgres for job tracking (separate DB from owl-n4j)
  evidence-postgres:
    image: postgres:16
    container_name: owl-evidence-pg
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ingestion
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - evidence-pg-data:/var/lib/postgresql/data

  # Evidence Engine API
  evidence-engine-api:
    build: ./evidence-engine
    container_name: owl-evidence-api
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@evidence-postgres:5432/ingestion
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: testpassword
      CHROMA_HOST: chromadb
      CHROMA_PORT: "8000"
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      STORAGE_PATH: /data/files
    volumes:
      - evidence-files:/data/files
    depends_on:
      - neo4j
      - evidence-postgres
      - redis

  # Evidence Engine Worker (arq background job processor)
  evidence-engine-worker:
    build: ./evidence-engine
    container_name: owl-evidence-worker
    restart: unless-stopped
    command: arq app.worker.WorkerSettings
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@evidence-postgres:5432/ingestion
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: testpassword
      CHROMA_HOST: chromadb
      CHROMA_PORT: "8000"
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      STORAGE_PATH: /data/files
    volumes:
      - evidence-files:/data/files
    depends_on:
      - neo4j
      - evidence-postgres
      - redis

volumes:
  evidence-pg-data:
  evidence-files: