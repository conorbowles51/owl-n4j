# Nginx configuration for v1/v2 parallel running
# During migration, serve both frontends simultaneously
#
# Usage: Include this file in your main nginx.conf server block
#   include /path/to/v2-migration.conf;

# v2 frontend (new default)
location / {
    root /srv/frontend_v2/dist;
    try_files $uri $uri/ /index.html;
}

# v1 frontend (rollback access)
location /v1/ {
    alias /srv/frontend/dist/;
    try_files $uri $uri/ /v1/index.html;
}

# API proxy (shared by both)
location /api/ {
    proxy_pass http://127.0.0.1:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # SSE support for chat streaming
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 300s;
}

# Health check
location /health {
    proxy_pass http://127.0.0.1:8000/health;
}
